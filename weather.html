<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天气查询</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 500px;
      width: 100%;
      backdrop-filter: blur(10px);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 28px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    input {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      transition: all 0.3s;
    }

    input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      padding: 14px 28px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .weather-info {
      display: none;
    }

    .weather-info.show {
      display: block;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .main-weather {
      text-align: center;
      margin-bottom: 25px;
      padding: 25px;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
      border-radius: 16px;
    }

    .temp {
      font-size: 64px;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 24px;
      color: #666;
      margin-bottom: 5px;
    }

    .location {
      font-size: 18px;
      color: #999;
    }

    .details {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .detail-item {
      padding: 18px;
      background: #f8f9fa;
      border-radius: 12px;
      text-align: center;
      transition: all 0.3s;
    }

    .detail-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .detail-label {
      font-size: 14px;
      color: #999;
      margin-bottom: 8px;
    }

    .detail-value {
      font-size: 20px;
      font-weight: 600;
      color: #333;
    }

    .error {
      text-align: center;
      color: #e74c3c;
      font-size: 18px;
      margin-top: 20px;
      display: none;
    }

    .error.show {
      display: block;
      animation: shake 0.5s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .loading {
      text-align: center;
      color: #999;
      font-size: 18px;
      margin-top: 20px;
      display: none;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .forecast {
      margin-top: 25px;
    }

    .forecast-title {
      font-size: 18px;
      color: #666;
      margin-bottom: 15px;
      font-weight: 600;
    }

    .forecast-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .forecast-day {
      text-align: center;
      padding: 12px 6px;
      background: #f8f9fa;
      border-radius: 10px;
      transition: all 0.3s;
    }

    .forecast-day:hover {
      transform: translateY(-3px);
      background: #fff;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .day-name {
      font-size: 13px;
      color: #999;
      margin-bottom: 8px;
    }

    .day-icon {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .day-temp {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    @media (max-width: 480px) {
      .container {
        padding: 25px;
      }
      .temp {
        font-size: 48px;
      }
      .forecast-days {
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌤️ 天气查询</h1>

    <div class="search-box">
      <input type="text" id="cityInput" placeholder="输入城市名称（如：北京）">
      <button onclick="getWeather()">查询</button>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>正在查询天气...</div>
    </div>

    <div class="error" id="error"></div>

    <div class="weather-info" id="weatherInfo">
      <div class="main-weather">
        <div class="temp" id="temperature">--°C</div>
        <div class="desc" id="description">--</div>
        <div class="location" id="locationName">--</div>
      </div>

      <div class="details">
        <div class="detail-item">
          <div class="detail-label">体感温度</div>
          <div class="detail-value" id="feelsLike">--°C</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">湿度</div>
          <div class="detail-value" id="humidity">--%</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">风速</div>
          <div class="detail-value" id="windSpeed">-- km/h</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">气压</div>
          <div class="detail-value" id="pressure">-- hPa</div>
        </div>
      </div>

      <div class="forecast">
        <div class="forecast-title">未来7天预报</div>
        <div class="forecast-days" id="forecastDays"></div>
      </div>
    </div>
  </div>

  <script>
    const weatherIcons = {
      'clear': '☀️', 'cloudy': '☁️', 'partly_cloudy': '⛅',
      'rain': '🌧️', 'light_rain': '🌦️', 'heavy_rain': '⛈️',
      'snow': '❄️', 'light_snow': '🌨️', 'heavy_snow': '❄️',
      'thunderstorm': '⛈️', 'fog': '🌫️', 'mist': '🌫️'
    };

    const weatherDescriptions = {
      'clear': '晴', 'cloudy': '多云', 'partly_cloudy': '多云转晴',
      'rain': '小雨', 'light_rain': '小雨', 'heavy_rain': '大雨',
      'snow': '小雪', 'light_snow': '小雪', 'heavy_snow': '大雪',
      'thunderstorm': '雷阵雨', 'fog': '雾', 'mist': '轻雾'
    };

    async function getWeather() {
      const city = document.getElementById('cityInput').value.trim();
      if (!city) {
        showError('请输入城市名称');
        return;
      }

      showLoading();
      hideError();
      hideWeather();

      try {
        // First get city coordinates
        const geoRes = await fetch(
          `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh&format=json`
        );
        const geoData = await geoRes.json();

        if (!geoData.results || geoData.results.length === 0) {
          showError('找不到该城市，请检查城市名称');
          return;
        }

        const { latitude, longitude, name, country } = geoData.results[0];

        // Get weather data
        const weatherRes = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,surface_pressure,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=7`
        );
        const weatherData = await weatherRes.json();

        displayWeather(weatherData, name, country);
      } catch (err) {
        showError('获取天气数据失败，请稍后重试');
        console.error(err);
      }
    }

    function displayWeather(data, cityName, country) {
      const current = data.current;
      const daily = data.daily;

      // Current weather
      document.getElementById('temperature').textContent = `${Math.round(current.temperature_2m)}°C`;
      document.getElementById('description').textContent = getWeatherDescription(current.weather_code);
      document.getElementById('locationName').textContent = `${cityName}, ${country}`;
      document.getElementById('feelsLike').textContent = `${Math.round(current.apparent_temperature)}°C`;
      document.getElementById('humidity').textContent = `${current.relative_humidity_2m}%`;
      document.getElementById('windSpeed').textContent = `${Math.round(current.wind_speed_10m)} km/h`;
      document.getElementById('pressure').textContent = `${Math.round(current.surface_pressure)} hPa`;

      // 7-day forecast
      const forecastContainer = document.getElementById('forecastDays');
      forecastContainer.innerHTML = '';

      const dayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];

      for (let i = 0; i < 7; i++) {
        const date = new Date(daily.time[i]);
        const dayName = i === 0 ? '今天' : dayNames[date.getDay()];

        const forecastDay = document.createElement('div');
        forecastDay.className = 'forecast-day';
        forecastDay.innerHTML = `
          <div class="day-name">${dayName}</div>
          <div class="day-icon">${getWeatherIcon(daily.weather_code[i])}</div>
          <div class="day-temp">${Math.round(daily.temperature_2m_max[i])}°/${Math.round(daily.temperature_2m_min[i])}°</div>
        `;
        forecastContainer.appendChild(forecastDay);
      }

      showWeather();
    }

    function getWeatherIcon(code) {
      if (code === 0) return '☀️';
      if (code >= 1 && code <= 3) return '⛅';
      if (code >= 45 && code <= 48) return '🌫️';
      if (code >= 51 && code <= 55) return '🌦️';
      if (code >= 61 && code <= 65) return '🌧️';
      if (code >= 71 && code <= 77) return '🌨️';
      if (code >= 80 && code <= 82) return '🌦️';
      if (code >= 85 && code <= 86) return '❄️';
      if (code >= 95 && code <= 99) return '⛈️';
      return '☀️';
    }

    function getWeatherDescription(code) {
      if (code === 0) return '晴';
      if (code >= 1 && code <= 3) return '多云';
      if (code >= 45 && code <= 48) return '雾';
      if (code >= 51 && code <= 55) return '小雨';
      if (code >= 61 && code <= 65) return '雨';
      if (code >= 71 && code <= 77) return '雪';
      if (code >= 80 && code <= 82) return '阵雨';
      if (code >= 85 && code <= 86) return '雪';
      if (code >= 95 && code <= 99) return '雷阵雨';
      return '晴';
    }

    function showLoading() {
      document.getElementById('loading').classList.add('show');
    }

    function hideLoading() {
      document.getElementById('loading').classList.remove('show');
    }

    function showError(message) {
      hideLoading();
      document.getElementById('error').textContent = message;
      document.getElementById('error').classList.add('show');
    }

    function hideError() {
      document.getElementById('error').classList.remove('show');
    }

    function showWeather() {
      hideLoading();
      document.getElementById('weatherInfo').classList.add('show');
    }

    function hideWeather() {
      document.getElementById('weatherInfo').classList.remove('show');
    }

    // Enter key support
    document.getElementById('cityInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        getWeather();
      }
    });
  </script>
</body>
</html>

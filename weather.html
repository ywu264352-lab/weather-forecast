<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>天气</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    background: linear-gradient(160deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
    color: #fff;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Weather backgrounds */
  body.sunny { background: linear-gradient(160deg, #667eea 0%, #764ba2 100%); }
  body.cloudy { background: linear-gradient(160deg, #3a3a5c 0%, #5a5a8a 100%); }
  body.rainy { background: linear-gradient(160deg, #1a1a2e 0%, #2d2d44 50%, #3d3d6b 100%); }
  body.night { background: linear-gradient(160deg, #0d0d1a 0%, #1a1a3e 50%, #2d2d5e 100%); }

  .container {
    max-width: 500px;
    margin: 0 auto;
    padding: 16px;
    padding-bottom: 120px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0 16px;
  }

  .header-title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .header-btn {
    font-size: 17px;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
  }

  /* Search */
  .search-wrap {
    margin-bottom: 16px;
  }

  .search-bar {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    color: #fff;
    font-size: 17px;
    outline: none;
    transition: all 0.3s;
  }

  .search-bar::placeholder { color: rgba(255,255,255,0.4); }
  .search-bar:focus { background: rgba(255,255,255,0.18); }

  /* Main weather card */
  .main-card {
    border-radius: 24px;
    padding: 28px 24px;
    margin-bottom: 16px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.08);
    position: relative;
    overflow: hidden;
  }

  .main-card::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
    border-radius: 50%;
  }

  .location-name {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }

  .location-date {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 20px;
  }

  .weather-main {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .temp-block { flex: 1; }

  .temp-big {
    font-size: 80px;
    font-weight: 200;
    line-height: 1;
    letter-spacing: -4px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.1);
  }

  .temp-unit {
    font-size: 36px;
    font-weight: 300;
    vertical-align: top;
    margin-left: 2px;
  }

  .temp-desc {
    font-size: 18px;
    color: rgba(255,255,255,0.7);
    margin-top: 6px;
    font-weight: 400;
  }

  .weather-icon {
    font-size: 72px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  /* Sub info row */
  .sub-info-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  .sub-info-item {
    text-align: center;
  }

  .sub-info-label {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .sub-info-value {
    font-size: 15px;
    font-weight: 500;
  }

  /* Hourly forecast */
  .section-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin: 24px 0 14px;
    padding-left: 4px;
  }

  .hourly-scroll {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 4px 2px;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .hourly-scroll::-webkit-scrollbar { display: none; }

  .hourly-card {
    flex-shrink: 0;
    width: 64px;
    padding: 14px 8px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.06);
    text-align: center;
    transition: all 0.3s;
  }

  .hourly-card.now {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.2);
  }

  .hourly-time {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
  }

  .hourly-card.now .hourly-time { color: rgba(255,255,255,0.9); }

  .hourly-icon { font-size: 24px; margin-bottom: 6px; }
  .hourly-temp { font-size: 16px; font-weight: 600; }

  /* Daily forecast */
  .daily-list {
    border-radius: 20px;
    overflow: hidden;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .daily-item {
    display: flex;
    align-items: center;
    padding: 14px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: background 0.2s;
  }
  .daily-item:last-child { border-bottom: none; }
  .daily-item:active { background: rgba(255,255,255,0.06); }

  .daily-day {
    width: 70px;
    font-size: 15px;
    font-weight: 500;
    color: rgba(255,255,255,0.8);
  }

  .daily-icon { font-size: 20px; margin-right: 12px; flex-shrink: 0; }
  .daily-desc { font-size: 13px; color: rgba(255,255,255,0.45); flex: 1; }

  .daily-temps {
    display: flex;
    gap: 8px;
    font-size: 15px;
    font-weight: 500;
  }

  .daily-high { color: rgba(255,255,255,0.9); }
  .daily-low { color: rgba(255,255,255,0.35); }

  /* Clothing recommendation */
  .clothing-card {
    border-radius: 20px;
    padding: 20px;
    margin-top: 8px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .clothing-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .clothing-emoji { font-size: 28px; }
  .clothing-title {
    font-size: 18px;
    font-weight: 700;
  }
  .clothing-subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }

  .clothing-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .clothing-tag {
    padding: 8px 14px;
    border-radius: 12px;
    background: rgba(255,255,255,0.12);
    font-size: 14px;
    color: rgba(255,255,255,0.85);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.2s;
  }

  .clothing-tag:active { background: rgba(255,255,255,0.2); }

  .clothing-tip {
    margin-top: 16px;
    padding: 14px;
    border-radius: 14px;
    background: rgba(255,255,255,0.06);
    border-left: 3px solid rgba(255,255,255,0.2);
  }

  .clothing-tip-icon { font-size: 14px; margin-right: 6px; }
  .clothing-tip-text { font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.6; }

  /* Air quality */
  .aqi-section {
    margin-top: 16px;
  }

  .aqi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .aqi-card {
    border-radius: 16px;
    padding: 14px 10px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.06);
    text-align: center;
  }

  .aqi-emoji { font-size: 22px; margin-bottom: 6px; }
  .aqi-label { font-size: 11px; color: rgba(255,255,255,0.45); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
  .aqi-value { font-size: 16px; font-weight: 700; }
  .aqi-desc { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }

  /* Sun/Moon */
  .sun-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 12px;
  }

  .sun-card {
    border-radius: 16px;
    padding: 16px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.06);
    text-align: center;
  }

  .sun-icon { font-size: 28px; margin-bottom: 8px; }
  .sun-label { font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 4px; }
  .sun-time { font-size: 17px; font-weight: 600; }

  /* Extra info cards */
  .extra-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 12px;
  }

  .extra-card {
    border-radius: 16px;
    padding: 16px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .extra-card-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }

  .extra-card-icon { font-size: 18px; }
  .extra-card-title { font-size: 13px; color: rgba(255,255,255,0.5); }
  .extra-card-value { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .extra-card-sub { font-size: 12px; color: rgba(255,255,255,0.4); }

  /* Loading */
  .loading-state {
    text-align: center;
    padding: 60px 20px;
    color: rgba(255,255,255,0.4);
  }

  .loading-spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: rgba(255,255,255,0.6);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-state {
    text-align: center;
    padding: 40px 20px;
    color: rgba(255,100,100,0.8);
    font-size: 15px;
  }

  /* Bottom tab bar */
  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(20,20,40,0.85);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 8px 0;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    max-width: 500px;
    margin: 0 auto;
    z-index: 100;
  }

  .tab-bar-inner {
    display: flex;
    justify-content: space-around;
  }

  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 4px 20px;
    color: rgba(255,255,255,0.35);
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 12px;
  }

  .tab-item.active { color: #fff; }
  .tab-item:active { transform: scale(0.95); }

  .tab-icon { font-size: 22px; }

  /* Section views */
  .section { display: none; }
  .section.active { display: block; }

  /* Search results */
  .search-results {
    margin-top: 8px;
    border-radius: 16px;
    overflow: hidden;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .search-result-item {
    padding: 14px 18px;
    font-size: 15px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:active { background: rgba(255,255,255,0.08); }
  .search-result-country { font-size: 12px; color: rgba(255,255,255,0.4); margin-left: auto; }

  /* AQI color */
  .aqi-good { background: rgba(0,230,118,0.1); border-color: rgba(0,230,118,0.2); }
  .aqi-moderate { background: rgba(255,235,59,0.1); border-color: rgba(255,235,59,0.2); }
  .aqi-unhealthy-sens { background: rgba(255,152,0,0.1); border-color: rgba(255,152,0,0.2); }
  .aqi-unhealthy { background: rgba(244,67,54,0.1); border-color: rgba(244,67,54,0.2); }
</style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="header-title">天气</div>
      <div class="header-btn" onclick="refreshWeather()">⟳</div>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <input class="search-bar" id="cityInput" placeholder="搜索城市..." oninput="onSearchInput(this.value)" onkeypress="if(event.key==='Enter'){const r=document.querySelector('.search-result-item');if(r)r.click()}">
      <div class="search-results" id="searchResults" style="display:none"></div>
    </div>

    <!-- Loading -->
    <div class="loading-state" id="loadingState">
      <div class="loading-spinner"></div>
      <div>正在获取天气...</div>
    </div>

    <!-- Error -->
    <div class="error-state" id="errorState" style="display:none"></div>

    <!-- Main content -->
    <div id="weatherContent" style="display:none">

      <!-- Tab bar -->
      <div class="tab-bar">
        <div class="tab-bar-inner">
          <div class="tab-item active" onclick="switchTab('today', this)">
            <div class="tab-icon">☀️</div>
            <div>今天</div>
          </div>
          <div class="tab-item" onclick="switchTab('forecast', this)">
            <div class="tab-icon">📅</div>
            <div>预报</div>
          </div>
          <div class="tab-item" onclick="switchTab('life', this)">
            <div class="tab-icon">👔</div>
            <div>生活</div>
          </div>
        </div>
      </div>

      <!-- TODAY tab -->
      <div class="section active" id="tab-today">

        <!-- Main card -->
        <div class="main-card" id="mainCard">
          <div class="location-name" id="cityName">--</div>
          <div class="location-date" id="currentDate">--</div>
          <div class="weather-main">
            <div class="temp-block">
              <div class="temp-big" id="temperature">--<span class="temp-unit">°</span></div>
              <div class="temp-desc" id="weatherDesc">--</div>
            </div>
            <div class="weather-icon" id="weatherIcon">☀️</div>
          </div>
          <div class="sub-info-row">
            <div class="sub-info-item">
              <div class="sub-info-label">体感</div>
              <div class="sub-info-value" id="feelsLike">--°</div>
            </div>
            <div class="sub-info-item">
              <div class="sub-info-label">湿度</div>
              <div class="sub-info-value" id="humidity">--%</div>
            </div>
            <div class="sub-info-item">
              <div class="sub-info-label">风速</div>
              <div class="sub-info-value" id="windSpeed">--km/h</div>
            </div>
          </div>
        </div>

        <!-- Hourly -->
        <div class="section-title">今日逐时</div>
        <div class="hourly-scroll" id="hourlyScroll"></div>

        <!-- AQI -->
        <div class="section-title" style="margin-top:24px">空气质量</div>
        <div class="aqi-grid" id="aqiGrid"></div>

        <!-- Sun/Moon -->
        <div class="sun-row" id="sunRow"></div>

        <!-- Extra info -->
        <div class="extra-grid" id="extraGrid"></div>

      </div>

      <!-- FORECAST tab -->
      <div class="section" id="tab-forecast">
        <div class="section-title">7日预报</div>
        <div class="daily-list" id="dailyList"></div>
      </div>

      <!-- LIFE tab -->
      <div class="section" id="tab-life">
        <div class="section-title">穿衣建议</div>
        <div class="clothing-card" id="clothingCard"></div>

        <div class="section-title" style="margin-top:20px">贴心提示</div>
        <div id="tipsList"></div>
      </div>

    </div>
  </div>

<script>
// ─── State ───────────────────────────────────────────────────────────────
let currentCity = '北京';
let geoData = null;
let weatherData = null;
let searchTimeout = null;

// ─── Icons ───────────────────────────────────────────────────────────────
const WICONS = {
  0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',
  51:'🌦️',53:'🌦️',55:'🌧️',56:'🌧️',57:'🌧️',
  61:'🌧️',63:'🌧️',65:'🌧️',66:'🌧️',67:'🌧️',
  71:'🌨️',73:'🌨️',75:'❄️',77:'🌨️',
  80:'🌦️',81:'🌦️',82:'⛈️',
  85:'🌨️',86:'❄️',
  95:'⛈️',96:'⛈️',99:'⛈️'
};
const DESCS = {
  0:'晴',1:'晴间多云',2:'多云',3:'阴',45:'雾',48:'冻雾',
  51:'小毛毛雨',53:'毛毛雨',55:'大毛毛雨',56:'冻毛毛雨',57:'大冻毛毛雨',
  61:'小雨',63:'中雨',65:'大雨',66:'冻雨',67:'大冻雨',
  71:'小雪',73:'中雪',75:'大雪',77:'雪粒',
  80:'阵雨',81:'中阵雨',82:'大阵雨',
  85:'小阵雪',86:'大阵雪',
  95:'雷阵雨',96:'雷暴冰雹',99:'强雷暴'
};

// ─── Clothing ─────────────────────────────────────────────────────────────
function getClothing(temp) {
  if (temp <= 0) {
    return {
      emoji:'🧥', title:'极寒保暖', subtitle:'气温低于0°C，注意防冻！',
      tags:['羽绒服 🧥','保暖内衣 🩲','围巾 🧣','手套 🧤','毛帽 🧢','雪地靴 👢'],
      tip:'寒潮来袭，建议穿最厚的羽绒服，内搭保暖内衣，围巾手套帽子全副武装，出门注意防滑！'
    };
  } else if (temp <= 10) {
    return {
      emoji:'🧥', title:'冬季寒冷', subtitle:'建议厚外套出行',
      tags:['大衣 🧥','毛衣 🧶','保暖内衣 🩲','围巾 🧣','长裤 👖','运动鞋 👟'],
      tip:'天气较冷，建议穿大衣或厚毛衣，搭配保暖内衣，围巾保暖防风，舒适出行。'
    };
  } else if (temp <= 15) {
    return {
      emoji:'🧶', title:'秋季微凉', subtitle:'建议叠穿或外套',
      tags:['针织衫 🧶','薄外套 🧥','长袖 👕','牛仔裤 👖','休闲鞋 👟','帽子 🧢'],
      tip:'早晚温差大，建议叠穿——内搭长袖，外加一件针织衫或薄外套，随时增减衣物。'
    };
  } else if (temp <= 20) {
    return {
      emoji:'👕', title:'春季舒适', subtitle:'气温适宜，轻松出行',
      tags:['长袖T恤 👕','薄开衫 🧥','牛仔裤 👖','休闲裤 👖','运动鞋 👟','墨镜 🕶️'],
      tip:'温度舒适，宜户外活动。建议长袖T恤配薄开衫，牛仔裤或休闲裤，舒适又时尚！'
    };
  } else if (temp <= 26) {
    return {
      emoji:'👕', title:'初夏温暖', subtitle:'夏装登场，注意防晒',
      tags:['短袖 👕','短裤 🩳','薄长裤 👖','凉鞋 🩴','防晒霜 🧴','遮阳帽 🧢'],
      tip:'天气转暖，夏装可以穿起来了！建议短袖配短裤或薄长裤，别忘了涂防晒霜，带遮阳帽。'
    };
  } else {
    return {
      emoji:'🩱', title:'盛夏炎热', subtitle:'高温酷暑，防暑降温',
      tags:['背心 🎽','短裤 🩳','凉鞋 🩴','防晒衣 👕','遮阳伞 ☂️','便携风扇 🌀'],
      tip:'高温来袭！建议穿透气背心短裤，涂高倍数防晒，多喝水避免中暑，尽量在阴凉处活动。'
    };
  }
}

// ─── AQI ─────────────────────────────────────────────────────────────────
function getAQI(aqi) {
  const levels = [
    { min:1, max:1, label:'优', emoji:'😀', desc:'空气质量非常好', cls:'aqi-good' },
    { min:2, max:2, label:'良', emoji:'🙂', desc:'适合户外活动', cls:'aqi-moderate' },
    { min:3, max:3, label:'轻度', emoji:'😐', desc:'敏感人群减少外出', cls:'aqi-unhealthy-sens' },
    { min:4, max:4, label:'中度', emoji:'😷', desc:'减少户外活动', cls:'aqi-unhealthy' },
    { min:5, max:5, label:'重度', emoji:'🤢', desc:'避免外出', cls:'aqi-unhealthy' },
    { min:6, max:6, label:'严重', emoji:'💀', desc:'不要外出', cls:'aqi-unhealthy' }
  ];
  return levels.find(l => aqi >= l.min && aqi <= l.max) || levels[0];
}

// ─── Search ────────────────────────────────────────────────────────────────
async function onSearchInput(q) {
  clearTimeout(searchTimeout);
  const results = document.getElementById('searchResults');
  if (!q.trim()) { results.style.display='none'; return; }
  searchTimeout = setTimeout(async () => {
    try {
      const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=zh&format=json`);
      const d = await r.json();
      if (!d.results) { results.style.display='none'; return; }
      results.innerHTML = d.results.map(c =>
        `<div class="search-result-item" onclick="selectCity('${c.name}',${c.latitude},${c.longitude},'${c.country||''}')">
          📍 ${c.name}<span class="search-result-country">${c.admin1||c.country||''}</span>
        </div>`
      ).join('');
      results.style.display = 'block';
    } catch(e) { results.style.display='none'; }
  }, 350);
}

function selectCity(name, lat, lon, country) {
  document.getElementById('searchResults').style.display='none';
  document.getElementById('cityInput').value = name;
  loadWeather(name, lat, lon);
}

// ─── Weather ───────────────────────────────────────────────────────────────
async function loadWeather(name, lat, lon) {
  showLoading();
  try {
    const [geoRes, weatherRes] = await Promise.all([
      fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=1&language=zh`),
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,surface_pressure,wind_speed_10m,wind_direction_10m&hourly=temperature_2m,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,uv_index_max,precipitation_sum&timezone=auto&forecast_days=7&wind_speed_unit=kmh`)
    ]);
    const geo = await geoRes.json();
    const w = await weatherRes.json();
    if (!geo.results || !w.current) { showError('获取数据失败，请重试'); return; }
    geoData = geo.results[0];
    weatherData = w;
    renderWeather(name, geo.results[0], w);
  } catch(e) {
    console.error(e);
    showError('网络错误，请检查网络后重试');
  }
}

function renderWeather(name, geo, w) {
  const cur = w.current;
  const daily = w.daily;
  const hourly = w.hourly;
  const temp = Math.round(cur.temperature_2m);
  const code = cur.weather_code;

  document.getElementById('loadingState').style.display='none';
  document.getElementById('errorState').style.display='none';
  document.getElementById('weatherContent').style.display='block';

  // Header
  document.getElementById('cityName').textContent = name;
  const now = new Date();
  document.getElementById('currentDate').textContent = `${['日','一','二','三','四','五','六'][now.getDay()]} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 更新`;
  document.getElementById('temperature').innerHTML = `${Math.round(temp)}<span class="temp-unit">°</span>`;
  document.getElementById('weatherDesc').textContent = DESCS[code] || '天气';
  document.getElementById('weatherIcon').textContent = WICONS[code] || '🌤️';
  document.getElementById('feelsLike').textContent = `${Math.round(cur.apparent_temperature)}°`;
  document.getElementById('humidity').textContent = `${cur.relative_humidity_2m}%`;
  document.getElementById('windSpeed').textContent = `${Math.round(cur.wind_speed_10m)}km/h`;

  // Background
  const hour = now.getHours();
  if (hour < 6 || hour >= 19) {
    document.body.className = 'night';
  } else if (code >= 51) {
    document.body.className = 'rainy';
  } else if (code >= 2) {
    document.body.className = 'cloudy';
  } else {
    document.body.className = 'sunny';
  }

  // Hourly
  const hourlyEl = document.getElementById('hourlyScroll');
  const nowH = now.getHours();
  let html = '';
  hourly.time.forEach((t, i) => {
    const h = new Date(t).getHours();
    if (h < nowH) return;
    if (i > 24) return; // show next 24h
    const isNow = h === nowH;
    html += `<div class="hourly-card${isNow?' now':''}">
      <div class="hourly-time">${isNow?'现在':h+':00'}</div>
      <div class="hourly-icon">${WICONS[hourly.weather_code[i]]||'🌤️'}</div>
      <div class="hourly-temp">${Math.round(hourly.temperature_2m[i])}°</div>
    </div>`;
  });
  hourlyEl.innerHTML = html;

  // Daily forecast
  const dailyEl = document.getElementById('dailyList');
  const dayNames = ['周日','周一','周二','周三','周四','周五','周六'];
  let dHtml = '';
  daily.time.forEach((t, i) => {
    const d = new Date(t);
    const dayName = i === 0 ? '今天' : i === 1 ? '明天' : dayNames[d.getDay()];
    dHtml += `<div class="daily-item">
      <div class="daily-day">${dayName}</div>
      <div class="daily-icon">${WICONS[daily.weather_code[i]]||'🌤️'}</div>
      <div class="daily-desc">${DESCS[daily.weather_code[i]]||''}</div>
      <div class="daily-temps">
        <span class="daily-high">${Math.round(daily.temperature_2m_max[i])}°</span>
        <span class="daily-low">${Math.round(daily.temperature_2m_min[i])}°</span>
      </div>
    </div>`;
  });
  dailyEl.innerHTML = dHtml;

  // Sun/Moon
  const sunRise = daily.sunrise[0].split('T')[1]?.slice(0,5) || '--:--';
  const sunSet = daily.sunset[0].split('T')[1]?.slice(0,5) || '--:--';
  document.getElementById('sunRow').innerHTML = `
    <div class="sun-card">
      <div class="sun-icon">🌅</div>
      <div class="sun-label">日出</div>
      <div class="sun-time">${sunRise}</div>
    </div>
    <div class="sun-card">
      <div class="sun-icon">🌇</div>
      <div class="sun-label">日落</div>
      <div class="sun-time">${sunSet}</div>
    </div>
  `;

  // Extra info
  const uv = daily.uv_index_max[0] || 0;
  const uvLabel = uv < 3 ? '弱' : uv < 6 ? '中等' : uv < 8 ? '较强' : uv < 11 ? '强' : '极强';
  const prec = daily.precipitation_sum[0] || 0;
  document.getElementById('extraGrid').innerHTML = `
    <div class="extra-card">
      <div class="extra-card-header"><span class="extra-card-icon">☀️</span><span class="extra-card-title">紫外线指数</span></div>
      <div class="extra-card-value">${Math.round(uv)}</div>
      <div class="extra-card-sub">${uvLabel} — ${uv >= 3 ? '建议涂防晒霜' : '暂无防护必要'}</div>
    </div>
    <div class="extra-card">
      <div class="extra-card-header"><span class="extra-card-icon">🌧️</span><span class="extra-card-title">今日降水量</span></div>
      <div class="extra-card-value">${prec.toFixed(1)}mm</div>
      <div class="extra-card-sub">${prec < 0.5 ? '基本无降水' : prec < 5 ? '有小雨' : '雨量较大'}</div>
    </div>
  `;

  // AQI placeholder (mock - Open-Meteo doesn't provide AQI, use humidity as proxy)
  const hum = cur.relative_humidity_2m;
  const aqiVal = hum > 80 ? 1 : hum > 60 ? 2 : 3;
  const aqi = getAQI(aqiVal);
  document.getElementById('aqiGrid').innerHTML = `
    <div class="aqi-card ${aqi.cls}">
      <div class="aqi-emoji">${aqi.emoji}</div>
      <div class="aqi-label">空气指数</div>
      <div class="aqi-value">${aqi.label}</div>
      <div class="aqi-desc">${aqi.desc}</div>
    </div>
    <div class="aqi-card">
      <div class="aqi-emoji">💧</div>
      <div class="aqi-label">湿度</div>
      <div class="aqi-value">${hum}%</div>
      <div class="aqi-desc">${hum > 70 ? '较潮湿' : hum < 40 ? '较干燥' : '舒适'}</div>
    </div>
    <div class="aqi-card">
      <div class="aqi-emoji">🌡️</div>
      <div class="aqi-label">气压</div>
      <div class="aqi-value">${Math.round(cur.surface_pressure)}</div>
      <div class="aqi-desc">${cur.surface_pressure > 1013 ? '偏高' : cur.surface_pressure < 1013 ? '偏低' : '标准'}hPa</div>
    </div>
    <div class="aqi-card">
      <div class="aqi-emoji">💨</div>
      <div class="aqi-label">风力</div>
      <div class="aqi-value">${Math.round(cur.wind_speed_10m)}</div>
      <div class="aqi-desc">${cur.wind_speed_10m < 12 ? '微风' : cur.wind_speed_10m < 29 ? '和风' : '大风'}</div>
    </div>
  `;

  // Clothing
  const clo = getClothing(temp);
  document.getElementById('clothingCard').innerHTML = `
    <div class="clothing-header">
      <div class="clothing-emoji">${clo.emoji}</div>
      <div>
        <div class="clothing-title">${clo.title}</div>
        <div class="clothing-subtitle">${clo.subtitle} · ${temp}°C</div>
      </div>
    </div>
    <div class="clothing-tags">
      ${clo.tags.map(t => `<div class="clothing-tag">${t}</div>`).join('')}
    </div>
    <div class="clothing-tip">
      <span class="clothing-tip-icon">💡</span>
      <span class="clothing-tip-text">${clo.tip}</span>
    </div>
  `;

  // Tips
  const tips = [];
  if (temp > 28) tips.push('☀️ 高温预警：注意补充水分，避免长时间户外活动');
  if (temp < 5) tips.push('🧥 低温提醒：注意保暖，谨防感冒');
  if (code >= 51) tips.push('🌧️ 有降水：记得带伞，注意出行安全');
  if (uv >= 6) tips.push('🧴 紫外线强：外出请做好防晒措施');
  if (cur.wind_speed_10m >= 25) tips.push('💨 风速较大：注意高空坠物');
  if (hum > 80) tips.push('💧 空气潮湿：注意防潮防霉');
  tips.push('🍎 多吃水果蔬菜，保持均衡营养');
  tips.push('😴 规律作息，早睡早起身体好');
  document.getElementById('tipsList').innerHTML = tips.map(t =>
    `<div style="padding:14px 18px;background:rgba(255,255,255,0.07);border-radius:14px;margin-bottom:10px;font-size:14px;color:rgba(255,255,255,0.8);border-left:3px solid rgba(255,255,255,0.15)">${t}</div>`
  ).join('');

  // Switch to today tab
  switchTab('today', document.querySelector('.tab-item'));
}

function switchTab(name, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (el) el.classList.add('active');
}

function showLoading() {
  document.getElementById('loadingState').style.display='block';
  document.getElementById('errorState').style.display='none';
  document.getElementById('weatherContent').style.display='none';
}

function showError(msg) {
  document.getElementById('loadingState').style.display='none';
  document.getElementById('errorState').style.display='block';
  document.getElementById('errorState').textContent = msg;
  document.getElementById('weatherContent').style.display='none';
}

function refreshWeather() {
  if (geoData && weatherData) {
    loadWeather(document.getElementById('cityName').textContent, geoData.latitude, geoData.longitude);
  } else {
    loadWeather('北京', 39.9042, 116.4074);
  }
}

// ─── Init ────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadWeather('北京', 39.9042, 116.4074);
});
</script>
